<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统维护公告 - U Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
}

body {
  font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  background: #0b0f1a;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(59, 42, 128, 0.35), transparent),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(20, 60, 120, 0.3), transparent),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(30, 20, 80, 0.2), transparent);
  z-index: 0;
  pointer-events: none;
}

.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
}

.card {
  position: relative;
  z-index: 1;
  width: 90%;
  max-width: 560px;
  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 20px;
  padding: 48px 40px 40px;
  animation: fadeUp 0.8s ease-out both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

.icon-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  margin: 0 auto 24px;
  border-radius: 50%;
  background: rgba(245, 166, 35, 0.12);
  border: 1px solid rgba(245, 166, 35, 0.2);
}

.icon-wrap svg {
  width: 32px;
  height: 32px;
  fill: none;
  stroke: #f5a623;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.brand {
  text-align: center;
  margin-bottom: 8px;
}

.brand-name {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.35);
}

h1 {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 28px;
  text-align: center;
  letter-spacing: 1px;
  color: #fff;
  margin-bottom: 20px;
}

h1 span {
  display: inline-block;
  background: linear-gradient(135deg, #f5a623, #f7c948);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sub {
  text-align: center;
  color: rgba(255, 255, 255, 0.6);
  font-size: 15px;
  line-height: 1.7;
  font-weight: 300;
  margin-bottom: 28px;
}

.time-block {
  background: rgba(245, 166, 35, 0.08);
  border: 1px solid rgba(245, 166, 35, 0.15);
  border-radius: 14px;
  padding: 20px 24px;
  margin-bottom: 28px;
  text-align: center;
}

.time-block .label {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(245, 166, 35, 0.6);
  margin-bottom: 6px;
}

.time-block .time {
  font-family: 'Outfit', 'Noto Sans TC', sans-serif;
  font-weight: 700;
  font-size: 22px;
  color: #f5a623;
  line-height: 1.5;
}

.time-block .time span {
  display: inline-block;
}

.divider {
  width: 40px;
  height: 3px;
  background: linear-gradient(90deg, rgba(245, 166, 35, 0.6), transparent);
  border-radius: 2px;
  margin: 0 auto 24px;
}

.impact {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.65);
  line-height: 1.8;
  margin-bottom: 24px;
  text-align: center;
}

.impact strong {
  color: #fff;
  font-weight: 500;
}

.notes {
  list-style: none;
  padding: 0;
  margin-bottom: 28px;
}

.notes li {
  position: relative;
  padding-left: 20px;
  font-size: 13.5px;
  color: rgba(255, 255, 255, 0.55);
  line-height: 1.7;
  margin-bottom: 6px;
}

.notes li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 10px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(245, 166, 35, 0.4);
}

footer {
  text-align: center;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.3);
  letter-spacing: 1px;
  padding-top: 20px;
  border-top: 1px solid rgba(255, 255, 255, 0.06);
}

.corner-glow {
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(100px);
  opacity: 0.15;
}

.corner-glow.g1 {
  top: -120px;
  right: -80px;
  background: #3b2a80;
}

.corner-glow.g2 {
  bottom: -100px;
  left: -60px;
  background: #1a4a8a;
}

@media (max-width: 480px) {
  .card {
    padding: 32px 24px 28px;
  }

  h1 {
    font-size: 22px;
  }

  .time-block .time {
    font-size: 18px;
  }

  .brand-name {
    font-size: 12px;
  }
}
</style>
</head>
<body>

<div class="corner-glow g1"></div>
<div class="corner-glow g2"></div>
<div class="bg-grid"></div>

<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </div>

  <div class="brand">
    <div class="brand-name">U Game</div>
  </div>

  <h1>系统维护公告</h1>

  <p class="sub">为提供更稳定、优质的服务体验，本站将于以下时间进行系统维护作业：</p>

  <div class="time-block">
    <div class="label">维护时间</div>
    <div class="time">
      2026-07-01（三）13:00 ~ 15:00
    </div>
  </div>

  <div class="divider"></div>

  <p class="impact">
    <strong>影响范围：</strong>维护期间全站暂停服务（包含登录、存款、投注、提现等）<br>
    <strong>预计恢复：</strong>下午 15:00 正常开放
  </p>

  <ul class="notes">
    <li>请避免在维护期间进行任何操作，以免资料异常</li>
    <li>维护完成后如遇任何问题，请联系 24 小时在线客服</li>
    <li>若有提前完成或延长维护，将另行公告</li>
  </ul>

  <p class="sub" style="margin-bottom:0">
    造成不便，敬请见谅，感谢您的支持与理解！
  </p>

  <footer>U Game 运营团队</footer>
</div>

</body>
</html>
