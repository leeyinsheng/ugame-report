<meta charset="UTF-8">

<title>系統維護公告 — U Game</title>
<style>
:root {
  --bg:      oklch(99% 0.002 240);
  --surface: oklch(100% 0 0);
  --fg:      oklch(18% 0.012 250);
  --muted:   oklch(54% 0.012 250);
  --border:  oklch(92% 0.005 250);
  --accent:  oklch(58% 0.18 255);

  --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;

}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-family: var(--font-body);
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.notice {
  max-width: 640px;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 48px 40px;
}

.notice-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.notice-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.notice-icon svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: #fff;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.notice-title {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--fg);
}

.notice-intro {
  font-size: 15px;
  line-height: 1.6;
  color: var(--fg);
  margin-bottom: 28px;
}

.info-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 28px;
}

.info-row {
  display: flex;
  gap: 8px;
  font-size: 14px;
  line-height: 1.6;
}

.info-label {
  color: var(--muted);
  white-space: nowrap;
  min-width: 88px;
  flex-shrink: 0;
}

.info-value {
  color: var(--fg);
  font-weight: 500;
}

.info-value em {
  font-style: normal;
  color: var(--accent);
  font-weight: 600;
}

.notes {
  background: oklch(from var(--bg) l c h / 50%);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 28px;
}

.notes-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 12px;
}

.notes-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.notes-list li {
  font-size: 14px;
  line-height: 1.6;
  color: var(--fg);
  padding-left: 16px;
  position: relative;
}

.notes-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 9px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.5;
}

.notice-footer {
  border-top: 1px solid var(--border);
  padding-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.notice-footer p {
  font-size: 14px;
  line-height: 1.6;
  text-align: center;
}

.notice-footer .apology {
  color: var(--muted);
}

.notice-footer .signature {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  color: var(--fg);
  margin-top: 4px;
}

@media (max-width: 480px) {
  body { padding: 16px; align-items: flex-start; padding-top: 40px; }
  .notice { padding: 32px 24px; border-radius: 10px; }
  .notice-title { font-size: 20px; }
  .info-row { flex-direction: column; gap: 2px; }
  .info-label { min-width: auto; }
}
