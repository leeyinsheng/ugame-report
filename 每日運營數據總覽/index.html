<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>U.Game 运营数据看板</title>
<style>
  :root{--blue:#1f3864;--blue2:#2f5496;--accent:#2f5496;--bg:#f4f6fa;--card:#fff;--line:#e6eaf0;--muted:#8a94a6;--green:#1a9e6a;--red:#d6455d;--txt:#1d2433;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.4;}
  .wrap{max-width:520px;margin:0 auto;padding:0 14px 40px;}
  header{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;margin:0 -14px 14px;padding:16px 18px 14px;border-radius:0 0 18px 18px;box-shadow:0 4px 16px rgba(31,56,100,.18);}
  header h1{margin:0;font-size:18px;font-weight:700;letter-spacing:.5px;}
  header .sub{font-size:12px;opacity:.85;margin-top:3px;}
  .datenav{display:flex;align-items:center;gap:8px;padding:13px 0 3px;}
  .navbtn{flex:0 0 auto;width:36px;height:38px;border-radius:12px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .navbtn:disabled{opacity:.3;}
  .datewrap{flex:1;position:relative;}
  .datesel{width:100%;height:38px;border-radius:12px;border:none;background:#fff;color:var(--blue);font-size:15px;font-weight:700;text-align:center;text-align-last:center;padding:0 26px;-webkit-appearance:none;appearance:none;cursor:pointer;}
  .datewrap::after{content:"▾";position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--blue2);font-size:12px;pointer-events:none;}
  .latest{flex:0 0 auto;height:38px;padding:0 13px;border-radius:12px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.15);color:#fff;font-size:13px;font-weight:600;cursor:pointer;}
  .latest:disabled{opacity:.45;}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .kpi{background:var(--card);border-radius:14px;padding:13px 14px;box-shadow:0 2px 10px rgba(31,56,100,.06);}
  .kpi .lab{font-size:12px;color:var(--muted);}
  .kpi .val{font-size:20px;font-weight:700;margin-top:4px;letter-spacing:.3px;}
  .kpi .dlt{font-size:12px;margin-top:3px;font-weight:600;}
  .up{color:var(--green);} .down{color:var(--red);}
  .sec{background:var(--card);border-radius:16px;margin-bottom:16px;box-shadow:0 2px 10px rgba(31,56,100,.06);overflow:hidden;}
  .sec h2{margin:0;font-size:15px;font-weight:700;color:var(--blue);padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;}
  .sec h2 .bar{width:4px;height:16px;background:var(--accent);border-radius:3px;}
  table{width:100%;border-collapse:collapse;}
  td{padding:11px 16px;font-size:14px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  td.k{color:#46506a;}
  td.v{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;}
  td.d{text-align:right;font-size:12px;width:62px;font-weight:600;}
  .chart-wrap{padding:6px 10px 14px;}
  .chart-t{font-size:13px;color:#46506a;font-weight:600;padding:12px 16px 2px;display:flex;justify-content:space-between;}
  .chart-t span{color:var(--blue);font-weight:700;}
  svg{display:block;width:100%;height:auto;}
  .note{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;line-height:1.6;}
  .seg{display:flex;gap:6px;padding:10px 14px 2px;overflow-x:auto;scrollbar-width:none;}
  .seg::-webkit-scrollbar{display:none;}
  .seg button{flex:0 0 auto;background:#eef1f7;border:none;border-radius:18px;padding:7px 13px;font-size:12.5px;font-weight:600;color:#46506a;cursor:pointer;}
  .seg button.on{background:var(--accent);color:#fff;}
  .rangebar{display:flex;gap:6px;padding:8px 14px 0;justify-content:flex-end;}
  .rangebar button{flex:0 0 auto;background:transparent;border:1px solid var(--line);border-radius:14px;padding:4px 10px;font-size:11.5px;font-weight:600;color:var(--muted);cursor:pointer;}
  .rangebar button.on{background:var(--accent);border-color:var(--accent);color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>U.Game 运营数据看板</h1>
    <div class="sub" id="sub"></div>
    <div class="datenav">
      <button class="navbtn" id="prev" onclick="step(-1)">‹</button>
      <div class="datewrap"><select class="datesel" id="datesel" onchange="setDay(parseInt(this.value))"></select></div>
      <button class="navbtn" id="next" onclick="step(1)">›</button>
      <button class="latest" id="latestBtn" onclick="setDay(DAYS.length-1)">最新</button>
    </div>
  </header>
  <div class="kpis" id="kpis"></div>
  <div class="sec">
    <h2><span class="bar"></span>趋势走势</h2>
    <div class="seg" id="seg"></div>
    <div class="rangebar" id="rangebar"></div>
    <div class="chart-t" id="chartT"></div>
    <div class="chart-wrap"><div id="chart"></div></div>
  </div>
  <div class="sec"><h2><span class="bar"></span>核心营收指标</h2><table id="t_rev"></table></div>
  <div class="sec"><h2><span class="bar"></span>会员指标</h2><table id="t_mem"></table></div>

</div>

function setRange(n){rangeN=n;renderRange();renderChart();}
function renderChart(){
  const cfg=TRENDS.find(t=>t[0]===metricKey),path=cfg[1],t=cfg[2];
  const start=rangeN>0?Math.max(0,DAYS.length-rangeN):0;
  const view=DAYS.slice(start);const vals=view.map(d=>get(d,path));
  const W=480,H=190,pl=10,pr=10,pt=26,pb=28;let mn=Math.min(...vals,0),mx=Math.max(...vals,0);if(mn===mx)mx=mn+1;
  const N=view.length;const sx=i=>pl+(W-pl-pr)*(N===1?0.5:i/(N-1));const sy=v=>pt+(H-pt-pb)*(1-(v-mn)/(mx-mn));const zeroY=sy(0);
  const stp=N>9?Math.ceil(N/6):1;const curLocal=cur-start;
  let pts=vals.map((v,i)=>`${sx(i)},${sy(v)}`).join(' ');
  let area=`${sx(0)},${zeroY} `+pts+` ${sx(N-1)},${zeroY}`;
  let dots=vals.map((v,i)=>{const on=i===curLocal,neg=v<0;return `<circle cx="${sx(i)}" cy="${sy(v)}" r="${on?5:3}" fill="${on?'#fff':(neg?'#d6455d':'#2f5496')}" stroke="${neg?'#d6455d':'#2f5496'}" stroke-width="${on?3:1.3}"/>`+(on?`<text x="${Math.min(Math.max(sx(i),34),W-34)}" y="${sy(v)-12}" text-anchor="middle" font-size="12" font-weight="700" fill="${neg?'#d6455d':'#1f3864'}">${fmt(v,t)}</text>`:'');}).join('');
  let labs=view.map((d,i)=>{const show=(i%stp===0)||i===curLocal||i===N-1;if(!show)return '';return `<text x="${sx(i)}" y="${H-8}" text-anchor="middle" font-size="10" fill="${i===curLocal?'#1f3864':'#8a94a6'}" font-weight="${i===curLocal?'700':'400'}">${md(d)}</text>`;}).join('');
  const zline=(mn<0&&mx>0)?`<line x1="${pl}" y1="${zeroY}" x2="${W-pr}" y2="${zeroY}" stroke="#cfd6e4" stroke-dasharray="3 3" stroke-width="1"/>`:'';
  document.getElementById('chart').innerHTML=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2f5496" stop-opacity=".18"/><stop offset="1" stop-color="#2f5496" stop-opacity="0"/></linearGradient></defs><polygon points="${area}" fill="url(#g)"/>${zline}<polyline points="${pts}" fill="none" stroke="#2f5496" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>${dots}${labs}</svg>`;
  document.getElementById('chartT').innerHTML=`${metricKey} 走势 <span>${fmt(get(DAYS[cur],path),t)}</span>`;
}
document.getElementById('sub').textContent=`核心营收 · 会员 · 充提　|　${md(DAYS[0])} 至 ${md(DAYS[DAYS.length-1])} · 共 ${DAYS.length} 天`;
renderNav();renderKPI();renderSeg();renderRange();renderTables();renderChart();
</script>
